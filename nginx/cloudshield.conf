# =============================================================================
# CloudShield AI — Nginx Reverse Proxy Configuration
# =============================================================================
# Routes all traffic through a single Nginx entry point:
#   /api/        → Employee Portal Backend   (Node.js :3000)
#   /            → Employee Portal Frontend  (static build)
#   /monitor/    → Monitoring Platform API   (Node.js :5000)
#   /socket.io/  → Socket.IO real-time feed  (Node.js :5000)
#   /dashboard/  → Security Dashboard        (static build)
#   /ai/         → AI Microservice           (Python  :8000)
# =============================================================================

# Employee Portal API
server {
    listen 80;
    server_name _;

    # ── Global Settings ──────────────────────────────────────────────────
    client_max_body_size 10M;
    proxy_read_timeout   300s;
    proxy_connect_timeout 75s;

    # ── Employee Portal Backend API ──────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Employee Portal Frontend (built static) ─────────────────────────
    location / {
        root /home/ubuntu/CloudShield-AI/employee-portal/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # ── Monitoring Platform API + Socket.IO ──────────────────────────────
    location /monitor/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Socket.IO for monitoring ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Security Dashboard (built static) ────────────────────────────────
    location /dashboard/ {
        alias /home/ubuntu/CloudShield-AI/security-dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # ── AI Service ───────────────────────────────────────────────────────
    location /ai/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
